services:
  ocelotapigateway:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5000
    depends_on:
      - accservice.api
      - productcatalogservice.api
      - blogservice.api
      - inventoryservice.api
    ports:
      - "5000:5000"
    networks:
      - ffm-network
    restart: always
  redis:
    image: redis:7-alpine
    hostname: redis
    ports:
      - "6379:6379"
    networks:
      - ffm-network
    restart: always
  accservice.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8080:8080"
    networks:
      - ffm-network
    restart: always
  productcatalogservice.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=7000
    ports:
      - "7000:7000"
    networks:
      - ffm-network
    restart: always
  blogservice.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=7200
      - ExternalServices__ProductCatalogBaseUrl=http://productcatalogservice.api:7000/
    ports:
      - "7200:7200" 
    networks:
      - ffm-network
    restart: always
  inventoryservice.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=7300
    ports:
      - "7300:7300"
    networks:
      - ffm-network
    restart: always
 
networks:
  ffm-network:
     driver: bridge
     





